<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Moving Car</title>
    <link rel="stylesheet" href="./day11.css" />
  </head>
  <body>
    <div class="sun"></div>
    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>
    <div class="cloud cloud3"></div>

    <div class="building" style="--position: 1">
      <div class="roof"></div>
      <div class="window-strip"></div>
      <div class="window-strip"></div>
      <div class="window-strip"></div>
      <div class="window-strip"></div>
    </div>
    <div class="building building2" style="--position: 2">
      <div class="roof"></div>
      <div class="window-strip"></div>
      <div class="window-strip"></div>
      <div class="window-strip"></div>
    </div>
    <div class="building" style="--position: 3">
      <div class="roof"></div>
      <div class="window-strip"></div>
      <div class="window-strip"></div>
      <div class="window-strip"></div>
      <div class="window-strip"></div>
    </div>

    <div class="tree" style="--position: 1">
      <div class="tree-top"></div>
    </div>

    <div class="tree" style="--position: 2">
      <div class="tree-top"></div>
    </div>

    <div class="tree" style="--position: 3">
      <div class="tree-top"></div>
    </div>

    <div class="road">
      <div class="road-line"></div>
    </div>

    <div class="van">
      <div class="van-body">
        <div class="window"></div>
        <div class="window"></div>
        <div class="tires">
          <div class="tire"></div>
          <div class="tire"></div>
        </div>
        <div class="exhaust">
          <div class="smoke"></div>
        </div>
      </div>
    </div>
  </body>
</html>
